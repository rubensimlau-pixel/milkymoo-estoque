<title>🥤 Milky Moo – Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--pink:#ffb6ca;--pink-light:#fff0f5;--pink-dark:#d4527a;--cream:#fff8f1;--teal:#222222;--teal-dark:#000000;--red:#ef476f;--orange:#f4a261;--purple:#845ec2;--gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;--shadow:0 4px 24px rgba(255,107,157,0.13);--radius:18px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);min-height:100vh;color:#222;}
  .screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
  #screen-login{background:linear-gradient(160deg,#ff6b9d 0%,#ffb3d1 50%,#fff8f1 100%);align-items:center;justify-content:center;padding:32px 20px;}
  .login-box{background:white;border-radius:28px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(255,107,157,0.25);text-align:center;}
  .login-sub{font-size:.85rem;color:var(--gray);margin-bottom:24px;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:var(--pink-dark);}
  .field-label{display:block;text-align:left;font-size:.78rem;font-weight:700;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .field-input{width:100%;border:2px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;color:#333;margin-bottom:14px;transition:border-color .2s;background:var(--gray-light);}
  .field-input:focus{outline:none;border-color:var(--pink);background:white;}
  .btn-login{width:100%;padding:14px;background:var(--pink);color:white;border:none;border-radius:12px;font-family:'Baloo 2',cursive;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,157,.4);transition:all .2s;margin-top:4px;}
  .btn-login:hover{background:var(--pink-dark);transform:translateY(-1px);}
  .login-hint{font-size:.75rem;color:var(--gray);margin-top:16px;line-height:1.6;}
  .login-error{background:#fee2e2;color:#991b1b;border-radius:10px;padding:10px 14px;font-size:.82rem;font-weight:600;margin-bottom:14px;display:none;}
